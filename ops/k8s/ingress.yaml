apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mm-rag-demo
spec:
  rules:
    - host: mm-rag-demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mm-rag-demo-web
                port:
                  number: 80
