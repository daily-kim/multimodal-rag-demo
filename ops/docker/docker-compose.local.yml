version: "3.9"

services:
  web:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile.web
    ports:
      - "8080:8080"
    env_file:
      - ../../.env
    volumes:
      - ../../data:/app/data

  worker:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile.worker
    env_file:
      - ../../.env
    volumes:
      - ../../data:/app/data

